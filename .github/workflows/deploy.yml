name: Deploy to EasyPanel

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    name: Trigger EasyPanel Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend (Staging)
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.EASYPANEL_FRONTEND_WEBHOOK }}" \
            | grep -q "^2" && echo "Frontend staging deploy triggered successfully" \
            || (echo "Frontend staging deploy failed" && exit 1)

      - name: Deploy Backend (Staging)
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.EASYPANEL_BACKEND_WEBHOOK }}" \
            | grep -q "^2" && echo "Backend staging deploy triggered successfully" \
            || (echo "Backend staging deploy failed" && exit 1)

      - name: Deploy Frontend (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.EASYPANEL_FRONTEND_WEBHOOK_PROD }}" \
            | grep -q "^2" && echo "Frontend production deploy triggered successfully" \
            || (echo "Frontend production deploy failed" && exit 1)

      - name: Deploy Backend (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.EASYPANEL_BACKEND_WEBHOOK_PROD }}" \
            | grep -q "^2" && echo "Backend production deploy triggered successfully" \
            || (echo "Backend production deploy failed" && exit 1)
