# ==========================================
# DESENVOLVIMENTO - com hot reload
# Uso: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Usa: .env.dev
# ==========================================

services:
  postgres:
    ports:
      - "5433:5432"  # Porta diferente para não conflitar com PostgreSQL local
    environment:
      POSTGRES_DB: studio_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_secure_pass_2024

  backend-node:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command: npm run dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://dev_user:dev_secure_pass_2024@postgres:5432/studio_dev?sslmode=disable
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - /app/node_modules
    ports:
      - "4000:4000"
      - "9229:9229"  # Debug port

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: npm run dev:frontend
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ./src:/app/src:ro
      - ./public:/app/public:ro
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./next.config.mjs:/app/next.config.mjs:ro
      - ./tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./components.json:/app/components.json:ro
      - /app/node_modules
      - /app/.next
    ports:
      - "9002:9002"
