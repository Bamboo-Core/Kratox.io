version: 1

previews:
  generation: automatic

envVarGroups:
  - name: PRODUCTION
  - name: PREVIEW

services:
  - type: web
    name: noc-ai-backend
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - fromGroup: PRODUCTION

      - key: DATABASE_URL
        fromDatabase:
          name: noc-ai-db
          property: connectionString

      # Para produção, você deve definir esta variável no painel do Render
      # com a URL do seu frontend da Vercel (ex: https://seu-app.vercel.app)
      - key: ALLOWED_ORIGINS
        value: ""

      # O Render preencherá esta variável com a URL do preview da Vercel automaticamente
      - key: IDE_PREVIEW_URL
        value: "" # Deixe em branco, o Render preenche

databases:
  - name: noc-ai-db
    region: oregon
    plan: free
    databaseName: noc_ai_db
    user: noc_ai_user
