# Habilita a criação de Ambientes de Preview para cada Pull Request.
previews:
  enabled: true

services:
  # Serviço do Frontend (Next.js)
  - type: web
    name: noc-ai-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: 'npm install && npm run build'
    startCommand: 'npm run start'
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: pserv
          name: noc-ai-backend
          property: url

  # Serviço do Backend (Node.js/Express)
  - type: pserv # Private Service, não exposto publicamente
    name: noc-ai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: 'cd backend && npm install && npm run build'
    startCommand: 'cd backend && npm run start'
    envVars:
      - fromGroup: PRODUCTION # <<< USA O SEU GRUPO DE PRODUÇÃO
      - key: DATABASE_URL # A URL do banco de dados ainda é gerada dinamicamente pelo Render
        fromDatabase:
          name: noc-ai-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: noc-ai-frontend
          property: url

    # Configuração para Ambientes de Preview (Pull Requests)
    previewEnvVars:
      - fromGroup: PREVIEW # <<< USA O SEU GRUPO DE PREVIEW

databases:
  - name: noc-ai-db
    region: oregon
    plan: free
    databaseName: noc_ai_db
    user: noc_ai_user
    # Cria uma nova instância do banco de dados para cada Ambiente de Preview
    previewDatabase:
      databaseName: noc_ai_preview_db
      user: noc_ai_preview_user

# Os grupos de variáveis de ambiente são definidos e gerenciados na UI do Render.
# Este bloco agora está vazio pois você já os criou.
envVarGroups: []
