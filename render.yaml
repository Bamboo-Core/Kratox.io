# Versão do schema do Blueprint
version: 1

# Define os grupos de variáveis de ambiente a serem gerenciados na UI do Render.
# Isto informa ao Render que os grupos 'PRODUCTION' e 'PREVIEW' existem.
envVarGroups:
  - name: PRODUCTION
  - name: PREVIEW

# Habilita e configura os Ambientes de Preview para Pull Requests
previews:
  enabled: true
  # Aplica o grupo de variáveis 'PREVIEW' a todos os serviços criados em ambientes de preview.
  previewEnvVarGroups:
    - name: PREVIEW

services:
  # Serviço do Frontend (Next.js)
  - type: web
    name: noc-ai-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: 'npm install && npm run build'
    startCommand: 'npm run start'
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: pserv
          name: noc-ai-backend
          property: url

  # Serviço do Backend (Node.js/Express)
  - type: pserv # Private Service, não exposto publicamente
    name: noc-ai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: 'cd backend && npm install && npm run build'
    startCommand: 'cd backend && npm run start'
    envVars:
      # No ambiente de produção (branch main), usa as variáveis do grupo PRODUCTION.
      - fromGroup: PRODUCTION
      # A URL do banco de dados ainda é gerada dinamicamente pelo Render.
      - key: DATABASE_URL
        fromDatabase:
          name: noc-ai-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: noc-ai-frontend
          property: url

databases:
  # Definição do banco de dados de produção
  - name: noc-ai-db
    region: oregon
    plan: free
    databaseName: noc_ai_db
    user: noc_ai_user
    # Configura como o banco de dados se comportará nos ambientes de preview.
    # Cria um novo banco de dados (plano free) para cada preview.
    previewPlan: free
