# Define as configurações do Blueprint para o Render
# Versão do schema
version: 1

# Declara os grupos de variáveis de ambiente para que apareçam na UI do Render
envVarGroups:
  - name: PRODUCTION
  - name: PREVIEW

# Habilita e configura os Ambientes de Preview para Pull Requests
previews:
  generation: automatic
  # Define quais grupos de variáveis de ambiente serão aplicados a TODOS os serviços em um preview
  previewEnvVarGroups:
    - name: PREVIEW

services:
  # Serviço do Frontend (Next.js)
  - type: web
    name: noc-ai-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: 'npm install && npm run build'
    startCommand: 'npm run start'
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: pserv
          name: noc-ai-backend
          property: url

  # Serviço do Backend (Node.js/Express)
  - type: pserv # Private Service, não exposto publicamente
    name: noc-ai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: 'cd backend && npm install && npm run build'
    startCommand: 'cd backend && npm run start'
    envVars:
      - fromGroup: PRODUCTION # Grupo para o ambiente de produção
      - key: DATABASE_URL
        fromDatabase:
          name: noc-ai-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: noc-ai-frontend
          property: url

databases:
  # Definição do banco de dados de produção
  - name: noc-ai-db
    region: oregon
    plan: free
    # Configura como o banco de dados se comportará nos ambientes de preview
    previewPlan: free # Cria um novo banco de dados (plano free) para cada preview
