# Define as configurações do Blueprint para o Render
# Versão do schema
version: 1

services:
  # Serviço do Backend (Node.js/Express)
  - type: web # Alterado de pserv para web para ser compatível com o plano
    name: noc-ai-backend
    env: node
    region: oregon
    plan: free # O plano 'free' para web services é aceitável
    buildCommand: 'cd backend && npm install && npm run build'
    startCommand: 'cd backend && npm run start'
    envVars:
      - fromGroup: PRODUCTION # Grupo para o ambiente de produção
      - key: DATABASE_URL
        fromDatabase:
          name: noc-ai-db
          property: connectionString
      # IMPORTANTE: Adicione a URL do seu frontend da Vercel aqui no painel do Render
      - key: ALLOWED_ORIGINS
        value: "" # Ex: https://seu-frontend.vercel.app
      - key: IDE_PREVIEW_URL
        sync: false

databases:
  # Definição do banco de dados de produção
  - name: noc-ai-db
    region: oregon
    plan: free
    databaseName: noc_ai_db
    user: noc_ai_user

# Declara os grupos de variáveis de ambiente para que o Render os reconheça na UI.
envVarGroups:
  - name: PRODUCTION
  - name: PREVIEW
