# Define as configurações do Blueprint para o Render
# Versão do schema
version: 1

# Habilita e configura os Ambientes de Preview para Pull Requests
previews:
  generation: automatic

services:
  # Serviço do Frontend (Next.js)
  - type: web
    name: noc-ai-frontend
    env: node
    region: oregon
    plan: free # O plano 'free' para web services é aceitável
    buildCommand: 'npm install && npm run build'
    startCommand: 'npm run start'
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web # Agora aponta para um web service
          name: noc-ai-backend
          property: url

  # Serviço do Backend (Node.js/Express)
  - type: web # <<< ALTERADO DE pserv PARA web
    name: noc-ai-backend
    env: node
    region: oregon
    plan: free # O plano 'free' para web services é aceitável
    buildCommand: 'cd backend && npm install && npm run build'
    startCommand: 'cd backend && npm run start'
    envVars:
      - fromGroup: PRODUCTION # Grupo para o ambiente de produção
      - key: DATABASE_URL
        fromDatabase:
          name: noc-ai-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: noc-ai-frontend
          property: url

databases:
  # Definição do banco de dados de produção
  - name: noc-ai-db
    region: oregon
    plan: free
    databaseName: noc_ai_db
    user: noc_ai_user
    # Para planos pagos, o Render clona o banco de dados para previews automaticamente
    # se a seção 'previews' estiver habilitada. Não é preciso 'previewPlan'.

# Declara os grupos de variáveis de ambiente para que o Render os reconheça na UI.
envVarGroups:
  - name: PRODUCTION
  - name: PREVIEW
