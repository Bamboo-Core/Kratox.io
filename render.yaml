version: 1

previews:
  generation: automatic

envVarGroups:
  - name: PRODUCTION
  - name: PREVIEW

services:
  - type: web
    name: noc-ai-backend
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start # This now runs 'tsx src/index.ts'
    envVars:
      - fromGroup: PRODUCTION

      - key: DATABASE_URL
        fromDatabase:
          name: noc-ai-db
          property: connectionString

      - key: ALLOWED_ORIGINS
        # Production value set in Render Dashboard
        value: "https://noc-ia.app"
        # Preview value will be a comma-separated list of URLs
        previewValue: "https://noc-ia.app,https://studio-git-dev-pablo-herzbergs-projects.vercel.app,https://studio-git-homologacao-pablo-herzbergs-projects.vercel.app"

      - key: IDE_PREVIEW_URL
        value: "" # Let Render populate this for previews

databases:
  - name: noc-ai-db
    region: oregon
    plan: free
    databaseName: noc_ai_db
    user: noc_ai_user
