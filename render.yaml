# Define as configurações do Blueprint para o Render
# Versão do schema
version: 1

# Habilita a criação de Ambientes de Preview para cada Pull Request.
previews:
  enabled: true
  # Define o nome do grupo de variáveis a ser usado para os ambientes de preview.
  envGroup: PREVIEW

services:
  # Serviço do Frontend (Next.js)
  - type: web
    name: noc-ai-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: 'npm install && npm run build'
    startCommand: 'npm run start'
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: pserv
          name: noc-ai-backend
          property: url

  # Serviço do Backend (Node.js/Express)
  - type: pserv # Private Service, não exposto publicamente
    name: noc-ai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: 'cd backend && npm install && npm run build'
    startCommand: 'cd backend && npm run start'
    envVars:
      - fromGroup: PRODUCTION # <<< USA O SEU GRUPO DE PRODUÇÃO
      - key: DATABASE_URL # A URL do banco de dados ainda é gerada dinamicamente pelo Render
        fromDatabase:
          name: noc-ai-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: noc-ai-frontend
          property: url

databases:
  # Definição do banco de dados de produção
  - name: noc-ai-db
    region: oregon
    plan: free # Define o plano para o banco de produção
    databaseName: noc_ai_db
    user: noc_ai_user
    # Configura como o banco de dados se comportará nos ambientes de preview
    previewPlan: free # Cria um novo banco de dados (plano free) para cada preview

# Os grupos de variáveis de ambiente são definidos e gerenciados na UI do Render.
# Este bloco agora está vazio pois você já os criou.
envVarGroups: []
