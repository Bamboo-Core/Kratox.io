# Define as configurações do Blueprint para o Render
# Versão do schema
version: 1

# Habilita a criação de Ambientes de Preview para cada Pull Request.
previews:
  generation: automatic

services:
  # Serviço do Frontend (Next.js)
  - type: web
    name: noc-ai-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: 'npm install && npm run build'
    startCommand: 'npm run start'
    envVars:
      # Render injeta a URL do serviço de backend dinamicamente.
      # Usamos a URL interna pois o frontend e backend estão na mesma rede privada.
      - key: NEXT_PUBLIC_API_URL
        value: ${noc-ai-backend_INTERNAL_URL}

  # Serviço do Backend (Node.js/Express)
  - type: pserv # Private Service, não exposto publicamente
    name: noc-ai-backend
    env: node
    region: oregon
    plan: free
    buildCommand: 'cd backend && npm install && npm run build'
    startCommand: 'cd backend && npm run start'
    envVars:
      - fromGroup: PRODUCTION # Grupo para o ambiente de produção
      - key: DATABASE_URL
        fromDatabase:
          name: noc-ai-db
          property: connectionString
      # A origem permitida para CORS é a URL externa do serviço de frontend
      - key: ALLOWED_ORIGINS
        value: ${noc-ai-frontend_EXTERNAL_URL}

databases:
  # Definição do banco de dados de produção
  - name: noc-ai-db
    region: oregon
    plan: free
    databaseName: noc_ai_db
    user: noc_ai_user
    # Omitindo 'previewPlan', o Render usará o plano 'free' do banco principal por padrão.

# Declara os grupos de variáveis de ambiente para que o Render os reconheça na UI.
envVarGroups:
  - name: PRODUCTION
  - name: PREVIEW
